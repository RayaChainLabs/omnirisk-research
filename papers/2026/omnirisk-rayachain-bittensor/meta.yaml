    summary: "Amend §Implementation Status (sec:status) and §Roadmap (sec:roadmap) to reflect the verified RYA mainnet deployment of 2026-05-04. The v0.22 text framed RayaChain as having 'zero mainnet deployments' across the prefatory paragraph of §17, the Table tab:status row 'RayaChain mainnet lanes', the §17.1 'Mainnet readiness' paragraph, and Roadmap step (ii). As of 2026-05-08, RYA SPL mint Eebqv…susV is live on Solana mainnet (the same mint exercised in §case-study), and a single canonical RYA OFT contract at 0x1a281E61… was deployed across six EVM mainnets (Ethereum, Arbitrum, Base, Polygon, Optimism, BSC) via CREATE2 through the Arachnid factory 0x4e59b448… in a tight coordination window on 2026-05-04. The amendment replaces the overclaimed-towards-zero prior framing with an honest two-layer split: (a) RYA token contracts deployed (1 + 6 chains, verified state); (b) operational fabric — peer wiring on the new mainnet OFTs, Solana-leg executor sidecar, on-disk canonical registry commit, third-party security audit — still outstanding. Sister issue OMN-181 (Developer) covers committing the mainnet entries to packages/config/rayachain.registry.json on disk."
