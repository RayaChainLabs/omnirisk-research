# Changes in revision v0.4 (response to forwarded academic review on OMN-34, 2026-05-03):
revision_log:
  v0_4:
    date: "2026-05-03"
    summary: "Address academic deep-research review forwarded from OMN-21."
    changes:
      - "Abstract: explicit research question + sharpened novelty claim (verification architecture, not agentic AI alone)"
      - "Introduction §1: explicit research question paragraph + novelty claim paragraph + expanded contributions list (4→5)"
      - "New §3 'Research Questions and Hypotheses': RQ1, RQ2, H1, H2 stated as falsifiable claims with operationalisation"
      - "New §4 'Related Work' (six sub-areas): bridge security SoKs, attack detection (BridgeGuard), multichain fraud, decentralised ML verification (opML + snarkGPT), oracle/DeFi systematisation (Werner et al. SoK), Bittensor mechanisms — with explicit gap statement"
      - "New §6 'Formal Definitions': Route q (Eq. 1), risk score s(q,t) (Eq. 2), realised loss decomposed into E1-E4, material chain-state change, confidence calibration via Brier (Eq. 3), validator loss L_i (Eq. 4)"
      - "§7 Miner Protocol: now references the formal q from Eq. 1 instead of redefining"
      - "§8 Validator Mechanism: now references L_i from Eq. 4; each scoring component grounded in a §6 sub-definition"
      - "§11 Evaluation: new sub-section §11.1 'Baselines' — B1 random, B2 single-chain liquidity-only, B3 static bridge-risk heuristic, B4 generic anomaly detector"
      - "§17 Limitations: explicit acknowledgement that H1/H2 are stated as falsifiable claims, not established results"
      - "Bibliography: +2 entries (ganescu2024trust, werner2022sok); total 16; both added to fill review-flagged related-work gaps"
  v0_5:
    date: "2026-05-03"
    summary: "Deepen engagement with three primary sources (Opentensor Yuma docs, LayerZero V2 dev docs, BridgeGuard) in response to 'enhance / study those documents' wake comment."
    changes:
      - "§4.3 Bittensor architecture: replaced summary-only attribution with the actual Yuma equations — consensus weight via stake-fraction-κ argmax (Eq. 5), clipped weights min(W_ij, W̄_j), aggregate ranking R_j, and miner emission share M_j. Source: Opentensor 2024 Yuma docs (verified 2026-05-03)."
      - "§6.4 Material chain-state change: replaced 'lane's DVN set, Executor, or per-OFT security configuration' with the precise LayerZero V2 UlnConfig + ExecutorConfig field names (confirmations, requiredDVNCount, requiredDVNs[], optionalDVNCount, optionalDVNs[], optionalDVNThreshold, maxMessageSize, executor) and noted send-vs-receive enforcement asymmetry. Source: LayerZero V2 dev docs (verified 2026-05-03)."
      - "§6.6 Validator loss → Yuma weights: replaced softmax handwave with explicit Eq. 6 (W_ij as temperature-scaled softmax of -L_j) AND the on-chain composition with the Yuma clipping rule, including economic self-correction analysis."
      - "New §6.7 'Worked example': single concrete route (USDC OFT, Arbitrum→Base, 100k) walked through information set, miner output, realised outcome, Brier contribution, and Yuma clipping. Grounds the abstraction."
      - "§4.2 Related Work / BridgeGuard: added concrete methodology (two-stage global+local graph mining), the 1:197 class-imbalance ratio (203 attack vs 40,000 normal), the +36.32pp recall improvement vs SOTA, and the implication that evaluation must use PR-AUC not just ROC-AUC. Source: Wu et al. 2025 (verified 2026-05-03)."
      - "§11 Evaluation: headline metrics now include precision-recall AUC alongside ROC-AUC, with imbalance-aware threshold-selection rationale tying back to §4.2."
      - "§5 System Architecture: replaced 'Figure omitted' embarrassment with Figure 1 — a labelled three-layer textual diagram showing intelligence/data-execution/verification layers with their inputs, outputs, and on-chain anchors."
      - "Reproducibility Note: documents the v0.5 primary-source extraction cycle (Yuma equations, UlnConfig fields, BridgeGuard imbalance ratio) so a future reviewer can independently verify provenance."
  v0_8:
    date: "2026-05-04"
    summary: "Reconcile against RayaChain mainnet-readiness audit (2026-05-03 wake comment on OMN-34) — testnet-only reality replaces 'six operational chains' framing."
    changes:
      - "§intro: 'six operationally-supported chains' → 'six TESTNET integrations (Sepolia / testnet / Amoy / devnet) with zero mainnet deployments and an engineering-estimated 4–8 weeks to mainnet-ready'. Names the six testnets explicitly."
      - "fig:arch-text Layer 2 row: testnet endpoint list, explicit '0 mainnet lanes', explicit '3 of 20 EVM↔EVM directional peer routes pass; 17 return NoPeer'."
      - "§arch:rayachain: testnet chain enumeration (Eth/Arb/Base Sepolia, BSC testnet, Polygon Amoy, Solana devnet); canonical-origin pointer still solana-devnet (EID 40168); Hardhat config knows only testnet networks."
      - "§status table: replaced single 'lanes' row with TESTNET vs MAINNET split — testnet row records 6 chains + 3-of-20 peer pass rate; mainnet row records ZERO deployments + 4–8 week estimate; Subtensor lane downgraded to design-proposal sequenced after mainnet cutover."
      - "§status:gaps: added two new paragraphs — 'Mainnet readiness (mainnet-readiness audit, 2026-05-03)' enumerating eight gaps (zero mainnet deployments, canonical origin testnet, Hardhat no mainnet networks, peer config empty, Base Sepolia owner mismatch, no multisig/timelock/governance, no third-party security audit, no mainnet runbook) AND 'Security incident (mainnet-readiness audit, 2026-05-03)' recording the three plaintext deployer keys (same secret 0xE60c…), and the plaintext Alchemy key. Also rewrote 'Unverified EVM↔EVM routes' with the concrete 3-of-20 pass count from peer-verification.generated.json."
      - "§roadmap: re-sequenced as seven steps with mainnet security and governance work as steps (i) and (ii), preceding miner API / subnet integration / Subtensor lane / follow-up paper."
      - "§eval: explicit 'all four datasets are testnet only as of submission-draft' caveat in the dataset preamble; flow-logs caveat now also names the 3-of-20 peer-route restriction; mainnet flows deferred to follow-up paper."
      - "Reproducibility Note: v0.8 entry."

  v0_7:
    date: "2026-05-04"
    summary: "Integrate locked RYA tokenomics (OMN-48 plan v4 — Final v1) per OMN-54."
    changes:
      - "§Economic Model: renamed to '§Economic Model and Tokenomics'; previous Bittensor verification-side flows preserved as new sub-section §economics:bittensor."
      - "New §economics:rya:design — fixed-supply rationale, immediate mint-authority revocation at TGE+LP (Solana setAuthority(mint,null), EVM transferOwnership(0x…dEaD)), pre-minted lockup-contract emissions; replaces vague mint-revocation language."
      - "New §economics:rya:config — RYA configuration table (1B fixed supply, Solana hub, EVM spokes, decimals 9/18 with OFT sharedDecimals=9, 3-of-5 multisig at TGE, transfer fees off, 5–8% TGE-day circulating)."
      - "New §economics:rya:dist — six-bucket distribution (35/25/15/10/10/5) with vesting and TGE-day-liquid columns; explicit 'no Investor bucket' note."
      - "New §economics:rya:emissions — 35% bucket (350M RYA), 4–5y curve with two viable shapes (yearly decay vs halving epochs) flagged for separate emissions-schedule child issue, three-channel allocation (stakers / contributors / Bittensor-aligned subnet)."
      - "New §economics:rya:fees — three revenue sources, buy-back ratio φ ∈ [0.30, 0.50] multisig-tunable, fee-flow figure, structural property statement (fee revenue is upper bound on staker RYA inflow)."
      - "New §economics:rya:utility — staking dual reward stream, fee discounts, access tiers."
      - "New §economics:rya:bittensor — value-flow alignment with two present-day levers (fee routing to subnet contributors, emissions reserve carve-out) and one explicitly forward-compatible governance lever (staking-influences-weighting), no immediate subnet-governance technical commitment asserted."
      - "Title page revision tag bumped to v0.7; Reproducibility Note appended with v0.7 entry."

  v0_6:
    date: "2026-05-03"
    summary: "Reconcile manuscript against operator-published RayaChain system summary (2026-05-03 wake comment on OMN-34)."
    changes:
      - "Chain count: corrected 'seven live lanes / planned eighth' → 'six operationally supported, one further lane in active integration, Subtensor EVM as the next planned addition'. Affects §1 Intro, §arch:rayachain, fig:arch-text, §status table, §roadmap, and §compare. Specific operationally-lit chain mapping is flagged for operator confirmation prior to submission rather than guessed."
      - "§arch:rayachain: added named 'Subsystems' description block — Transfer Engine (8-state quote→build→sign→send lifecycle, EVM↔EVM/EVM↔Solana/Solana↔EVM route classes), Risk Broadcast System (hub-spoke topic feeds, EVM on-chain path + Solana executor sidecar), Route Health System (p50/p99 latency / liquidity / volume / success rate / risk grade @ 15s refresh). The paper previously treated RayaChain as monolithic OFT, which understated the actual production surface."
      - "§status: rewrote table with three-class status (live / live-but-gated / design proposal) per RayaChain subsystem; added new subsection §status:gaps enumerating six known production gaps surfaced by the operator (transfer persistence missing, slippage controls missing, Risk Broadcast readiness=false, EVM↔EVM routes unverified subset, registry-fallback decimal handling unsafe, API handler-router drift). Schema explicitly asks for honest implementation status; v0.5 boosterism replaced."
      - "§eval (Data and Evaluation Framework): added Route Health time series as fourth dataset; flow logs reframed as OFTSent/OFTReceived joined per LayerZero V2 GUID with explicit acknowledgement that until Transfer Engine persistence ships, the join failure rate must be tracked and the replay set restricted to successfully-joined routes."
      - "Reproducibility Note: appended v0.6 entry documenting the three substantive corrections so a future reviewer can audit what changed and why."

