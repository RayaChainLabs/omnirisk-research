# Changes in revision v0.4 (response to forwarded academic review on OMN-34, 2026-05-03):
revision_log:
  v0_10:
    date: "2026-05-06"
    summary: "Reframe contribution from 'verifiable cross-chain bridge risk' to the broader thesis of 'agentic, context-aware risk prediction for the Internet of Value', characterised as the composition of five engines (prediction / Bittensor prediction subnet / sentiment fusion / agentic / API risk + scenario). Add the 2026-05-06 RYA defence cycle as an instrumented case study. Issue: OMN-152."
    changes:
      - "Title and pdf metadata: 'Verifiable Cross-Chain Risk Intelligence: An Agentic Architecture over LayerZero V2 and Bittensor' → 'Agentic, Context-Aware Risk Prediction for the Internet of Value: A Five-Engine, Verifiable Architecture over LayerZero V2 and Bittensor'."
      - "Abstract rewritten around the IoV thesis, the five engines (with citations), and the RYA defence-cycle case study."
      - "§intro: new paragraph 'The IoV reframe' (composite-context risk; rug pulls and sniper bots cited from cernera2023token); research-question paragraph rewritten to ask whether the IoV risk primitive can be made simultaneously agentic, context-aware, and verifiable; novelty-claim paragraph rewritten as the five-engine composition; contributions list expanded 5 → 6 (added the case study)."
      - "New §3 'A Five-Engine Architecture for Agentic IoV Risk' (label sec:five-engine), inserted between §problem and §rq, with five named subsections (sec:engine:prediction, sec:engine:subnet, sec:engine:sentiment, sec:engine:agentic, sec:engine:scenario) and a composition subsection (sec:engine:composition). New Figure 1 'five-engine-architecture.pdf' (vector, generated)."
      - "§arch:omnirisk: retitled 'OmniRisk — Agentic Engine'; explicitly identifies OmniRisk as the agentic-engine instance; references the constitutional/role-bound action constraints of bai2022constitutional; describes the paused-by-default + human-approval-boundary stance."
      - "§arch:bittensor: retitled 'Bittensor — Prediction-Engine Subnet and Verification Layer'; explicit dual role; cites taoshi2024ptn as the closest live-2026 precedent (Subnet 8 PTN)."
      - "New §arch:sentiment 'Sentiment-fusion engine': three-modality late-fusion + stacking (text / on-chain / grey-lit Solana); citations schumaker2009textual, xing2018natural, day2016deep."
      - "New §arch:scenario 'API risk + scenario engine': existing API surface + smallest delta (program registry / trigger evaluator / constrained execution); citations glasserman2003monte (Monte Carlo financial-engineering scenario generation), nist2006sp80084 (NIST tabletop precondition / trigger / action / post-condition structure)."
      - "New §case-study 'The RYA Defence Cycle, 2026-05-06' (label sec:case-study), inserted between §eval and §economics. Four subsections: setup (asset/venue/wallet/Trader-role contract/.env knobs), timeline (six numbered events from 01:00 → 06:13 UTC), buy-by-buy table (Table tab:rya-defence-buys, 30 rows, every TWAP completion with timestamp / price / tier / spend / cumulative), and reading-the-cycle-as-a-five-engine-instance (mapping each engine onto the cycle, with explicit limitations). Two new figures: rya-defence-cycle-prices.pdf (price-time with 30 bot-buy markers) and rya-defence-cycle-liquidity.pdf (pool liquidity envelope from point readings). Companion operator-side narrative cited as omnirisk2026defending."
      - "§limitations: added two new bullets — 'The case study is a single 5-hour cycle on a single Solana micro-cap pool' and 'The agentic engine in the case study is rule-based, not LLM-mediated'; existing four bullets preserved; one extra bullet added for grey-literature feed fragility in the sentiment-fusion engine. H1/H2 falsifiability statements preserved."
      - "Bibliography: +10 new entries (bai2022constitutional, yang2023fingpt, wu2023bloomberggpt, schumaker2009textual, xing2018natural, day2016deep, taoshi2024ptn, glasserman2003monte, nist2006sp80084, cernera2023token, omnirisk2026defending; net +11 because the operator-side Paragraph publication is counted separately). Total 26 entries; bibliography_audit.verified_at refreshed to 2026-05-06."
      - "Three vector PDFs added under figures/ (five-engine-architecture.pdf, rya-defence-cycle-prices.pdf, rya-defence-cycle-liquidity.pdf). Generation script: figures/_make_figures.py reads /Users/bazmini/omnirisk/bot/logs/decisions.jsonl and produces all three deterministically. Designer agent (OMN-152 child) is expected to replace these v0.10 baseline figures with polished versions."
      - "Reproducibility Note: v0.10 entry inserted; describes the case-study data provenance (decision-log path, state.json post-cycle values, .env knobs that were quoted but never private keys)."
      - "Title page revision tag bumped 0.9 → 0.10."
