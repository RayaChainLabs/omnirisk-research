      - "Abstract: replaced with CEO's verbatim text. Opens 'Cross-chain financial systems present a class of systemic risk that existing risk frameworks are ill-equipped to address.' Names OmniRisk + RayaChain + 8-chain coverage + four research primitives (route-risk scoring, liquidity fragmentation analysis, anomalous cross-chain activity detection, confidence-calibrated financial intelligence) + Bittensor as decentralised verification substrate. Adds \\cite{} calls for zarick2024layerzero/layerzero2024oft and rao2021bittensor/steeves2022incentivizing/opentensor2024yuma without changing the wording. Drops the v0.14–v0.17 IoV/five-engine/L_i/empirical-anchor opener — that material lives in the body."
      - "§intro: first-mention glosses for Omnichain Fungible Tokens ('a token that exists on multiple chains as one logical asset') and Decentralised Verifier Networks ('an independent party that signs off on a cross-chain message before it is delivered') so a non-specialist reader can follow the LayerZero V2 substrate description on first encounter."
      - "§problem: new non-specialist preamble paragraph at the head: 'Cross-chain finance is now the dominant marginal risk in DeFi, but the tools used to assess that risk still think in terms of single chains.' Followed by the existing three-paragraph technical breakdown. AMM first-mention reframed as 'a decentralised trading pool (the on-chain equivalent of order-book exchanges, hereafter trading pools)'."
      - "§formal:calibration: prepended the Brier-score equation with a plain-English claim: 'we score a miner not just by whether it predicted the right direction but by whether its confidence matched its accuracy over time' + 'a calibration error that penalises both wrong predictions and overconfidence', with 'hereafter the calibration error' established. Equation itself unchanged."
      - "§arch:bittensor: prepended the Yuma consensus equation with a plain-English claim: 'each validator gives every miner a quality score; the Yuma Consensus mechanism (the Bittensor reward-allocation rule, hereafter the reward-allocation rule) takes those scores, clips outliers against a stake-weighted majority threshold, and pays out rewards in proportion to the clipped scores. The clipping is what bounds the influence of any single validator, so a corrupted validator cannot unilaterally inflate or suppress a miner's reward.' Equation itself unchanged."
      - "§case-study:setup: rewritten as three accessible paragraphs (the asset and the venue / the wallet, role contract, and what the bot is allowed to do / the tier ladder). The CPMM jargon is unpacked as 'a constant-product trading pool... where the product of the two reserve quantities is held constant by the pricing function, so larger trades move the price more.' TWAP first-mention is glossed as 'time-weighted slicing of an order across N seconds to reduce price impact, hereafter time-weighted slicing.' The .env config-knob wall is collapsed into accessible prose; all numeric values preserved."
      - "§case-study:timeline: converted from a description-list of 9 timestamped items into chronological prose paragraphs, each anchored by 'On 2026-05-06 at HH:MM UTC...'. The narrative arc is preserved (dump → defend → first organic recovery → second sell wave → continued defence → ratchet step 3 → wallet topped) but reads as a story a curious non-specialist can follow. The architecturally-load-bearing observation about the role contract holding under pressure is now stated explicitly ('every single escalation step was an out-of-band human approval... before the bot's policy widened. The role contract's invariants held throughout')."
      - "§limitations: rewritten as falsification statements. Each bullet now leads with 'here is what would have to be observed for the claim to fail, and the smallest experiment that could observe it.' Eight bullets total: single-cycle/single-pool case study; rule-based agentic engine; deferred validator-loss claims (with the prediction-router open work as the smallest falsification path); the 99.34% top-1,000-cohort caveat; Bittensor centralisation risk; LLM-mining determinism; grey-literature feed dependence; withdrawn primary source. Tone shift: from 'we explicitly flag' (defensive) to 'here is the cheapest way to prove us wrong' (research-grade)."
      - "Title page revision tag bumped 0.17 → 0.18. Status remains internal-review."
      - "What is NOT changed: title, authors, bibliography (still 52 entries — no additions or removals; v0.18 is purely a prose-grade rewrite), the calibration arc and class-imbalance caveats from v0.16, the gated-by-design framing from v0.17, the Bittensor shadow-soak Table tab:soak-deferred from v0.15, the rayachain registry table from v0.15, the 52-row buy-by-buy table from v0.14, the five-engine architecture from v0.10."
