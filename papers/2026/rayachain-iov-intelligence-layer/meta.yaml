scope:
  in: |
    A positioning paper. RayaChain reframed as the intelligence layer for
    the Internet of Value, anchored on five differentiators (cross-chain
    coordination, semantic risk propagation, AI/agentic reasoning,
    predictive infrastructure, portable financial context) compared
    head-to-head against LayerZero, Chainlink CCIP, Axelar, Bittensor,
    and EigenLayer/EigenCloud. Mainnet implementation status (Solana
    SPL mint + 6 EVM OFT contracts, registry v3 commit, RAYA defence
    bot, Bittensor subnet soak) reported with public artefact references.
    Honesty caveat — narrative ahead of visible product — explicit.
  out: |
    No deep-dive on any one comparator. No tokenomics restatement
    (existing Paragraph article carries that). No mathematical
    formalisation (canary paper §V already has it).

