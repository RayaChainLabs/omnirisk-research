    changes:
      - "manuscript.tex populated from the scaffold to a 4-page short summary article. Six \\section* sections: 'The problem in one paragraph' (~125 words); 'The five engines' (~270 words across five short paragraphs, one analogy per engine — weather report, Wikipedia for forecasts, tape reader, paid trader with a chaperone, automatic fire drill); 'The case study (in plain English)' (~315 words, chronological narrative anchored on UTC timestamps with the 02:38 stop-loss event and 03:44 manual override); 'The 168-hour calibration arc' (~165 words, leads with 53% baseline, ends with Brier 0.1335); 'What this isn't' (three honest disclaimers: not a retail trading bot; not a decentralised system yet; not a generalisation claim); 'Read more' (in-text URLs to focused paper, Paragraph article, decision log, soak telemetry)."
