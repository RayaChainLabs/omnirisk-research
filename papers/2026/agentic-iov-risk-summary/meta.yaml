scope:
  in: |
    Plain-English summary of the five-engine architecture and the RYA defence cycle.
    Aimed at a non-specialist technical reader (CTO / VC / engineer in another vertical).
    Heavy use of analogies, light use of formalisation, no equations except where unavoidable.
    Same numbers as the focused paper (5,097 round soak, 99% accuracy with class-imbalance caveat,
    27-hour cycle / 52 buys / 5.2 SOL deployed) but woven into a narrative rather than a results table.
  out: |
    No threat-model section.
    No formal validator-loss decomposition.
    No bibliography section heavier than ~6 entries (the most-cited primary sources).
    No CRediT / funding / data-availability statements (those live in the focused paper).
    No tables; up to 2 figures (the architecture diagram and one chart).

