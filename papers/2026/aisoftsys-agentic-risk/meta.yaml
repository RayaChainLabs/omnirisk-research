scope:
  in: |
    Two engineering pillars confirmed by CEO 2026-05-09:
      (1) cost-aware AI engine -- prediction-router, verification subnet,
          constitutional-agent token budgets, tiered sentiment ingestion
          treated as one cost-management discipline;
      (2) self-adaptive agentic AI -- MAPE-K-style adaptation in which
          the agent observes its own miss-rate and reconfigures models,
          ensemble weights, and action thresholds on a versioned
          calibration manifest.
    The 27-hour Solana liquidity stress experiment and the 168-hour
    prediction-router calibration arc are recast as evidence that the
    two pillars work in production, not as security or finance results.
    Lessons applicable beyond blockchain to any agentic AI system whose
    inputs and actions share a partially-trusted environment.
  out: |
    Threat-model / attacker analysis (companion paper
    agentic-iov-risk-focused targets IEEE TIFS for that material).
    DeFi market microstructure, financial-economics arguments, or any
    investment / financial-advice claim.
    Bittensor / RayaChain protocol or tokenomics deep-dive (covered in
    omnirisk-rayachain-bittensor and rayachain-iov-intelligence-layer).
    Validator-loss-decomposition formalism (cited only).

