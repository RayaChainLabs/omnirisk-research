scope:
  in: |
    A software-engineering perspective on the OmniRisk five-engine
    architecture: how prediction, decentralised verification, sentiment
    fusion, constitutional agentic action, and scenario API compose into
    one operational risk intelligence system.
    Engineering decisions and tradeoffs (modularity, monitoring,
    observability, calibration, policy constraints) under adversarial,
    partially-trusted operating conditions.
    The 27-hour Solana liquidity stress experiment and the 168-hour
    prediction-router calibration arc as systems-engineering case studies
    (not as security or finance results).
    Lessons applicable beyond blockchain to any agentic AI system that
    monitors and acts on a partially-trusted environment.
  out: |
    Threat-model / attacker analysis (those belong in the IEEE-TIFS
    companion paper agentic-iov-risk-focused).
    DeFi market microstructure, financial-economics arguments, or any
    investment / financial-advice claim.
    Bittensor / RayaChain protocol or tokenomics deep-dive (covered in
    omnirisk-rayachain-bittensor and rayachain-iov-intelligence-layer).
    Validator-loss-decomposition formalism (cited only).

