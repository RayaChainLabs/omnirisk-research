scope:
  in: |
    A 5-engine architecture for agentic, context-aware risk prediction.
    The RYA liquidity-defence cycle as a fully-public case study.
    The 168h prediction-router calibration arc (53% baseline → 77% → 99% with class-imbalance honesty).
    The Bittensor shadow-validator soak as evidence the verification substrate is deployable.
    Honest limitations: single pool, deterministic policy, deferred §validator-loss measurement.
  out: |
    Cross-chain bridge SoK (compressed to 2-3 sentences, citation only).
    RayaChain tokenomics (§economics:rya:* in the long paper) — out of scope here.
    Subtensor EVM integration deep-dive — out of scope here.
    Full §formal definitions — collapse to 2-3 essential equations.
    Implementation status table (full) — replace with a 1-paragraph status statement.

